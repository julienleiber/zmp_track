name: Daily Signal

on:
  schedule:
    - cron: "0 18 * * 1-5"   # 18h00 UTC, lundi–vendredi
  workflow_dispatch:          # déclenchement manuel possible

jobs:
  compute-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Compute and update signal
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python compute_signal.py

      - name: Commit signal update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_current.json
          git diff --cached --quiet || git commit -m "signal: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
